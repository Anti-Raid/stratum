syntax = "proto3";

package stratum;

message AnyValue {
    // msgpack encoded response
    bytes data = 1;
}

enum TenantType {
  USER = 0;
  GUILD = 1;
}

message Id {
  uint64 tenant_id = 1;
  TenantType tenant_type = 2;
}

// A event from discord to the target worker
message DiscordEvent {
    // The event name, e.g. MESSAGE_CREATE
    string event_name = 1;
    
    // The event payload, json encoded string
    string payload = 2;

    // The tenant id this event is associated with
    Id id = 3;
}

message Worker {
    uint32 worker_id = 1;
    string grpc_access_key = 2;
}

message OtherAuthorized {
    string grpc_access_key = 2;
}

enum ShardState {
    ACTIVE = 0;
    DISCONNECTED = 1;
    FATALLY_CLOSED = 2;
    IDENTIFYING = 3;
    RESUMING = 4;
}

message ShardStatus {
    uint32 shard_id = 1;
    double latency = 4;
    ShardState state = 5;
}

message Status {
    repeated ShardStatus shards = 1;
    uint64 guild_count = 2;
    uint64 user_count = 3;
}

enum ResourceType {
    R_CHANNEL = 0;
    R_GUILD = 1;
    R_GUILD_ROLE = 2;
    R_GUILD_ROLES = 3;
    R_GUILD_CHANNELS = 4;
    R_GUILD_MEMBER = 5;
    R_CURRENT_USER = 10;
}

message GetResourceRequest {
    ResourceType type = 1;
    uint64 id = 2; // may be 0 (for e.g. R_CURRENT_USER)
    uint64 id_b = 3; // only set for R_GUILD_MEMBER
    uint32 flags = 4;
    OtherAuthorized auth = 5;
}

message IsResourceInCacheRequest {
    ResourceType type = 1;
    uint64 id = 2; // may be 0 (for e.g. R_CURRENT_USER)
    uint64 id_b = 3; // only set for R_GUILD_MEMBER
    OtherAuthorized auth = 4;
}

message IsResourceInCacheResponse {
    bool cached = 1;
}

message StratumConfig {
    uint32 num_workers = 1;
}

message ShardReadyUpdate {
  // A simple list of shard IDs that are currently ready
  repeated uint32 ready_shards = 1;
  uint32 total_shards = 2;
}

message BulkIsResourceInCacheRequest {
    ResourceType type = 1;
    repeated uint64 id = 2; // may be 0 (for e.g. R_CURRENT_USER)
    repeated uint64 id_b = 3; // only set for R_GUILD_MEMBER
    OtherAuthorized auth = 4;
}

message BulkIsResourceInCacheResponse {
    repeated bool cached = 1;
}

// Stratum service (runs on stratum and called by template-worker)
service Stratum {
    // EventStream is a streaming RPC that allows the master to send Discord events to the worker
    rpc EventStream(Worker) returns (stream DiscordEvent);

    // ShardReadyStream provides shard ready updates as shards become ready/non-ready
    rpc ShardReadyStream(OtherAuthorized) returns (stream ShardReadyUpdate);

    // GetStatus returns the current status of shards in Stratum
    rpc GetStatus(OtherAuthorized) returns (Status);

    // GetResourceFromCache returns the cached resource data or null
    //
    // @returns <resource>?
    rpc GetResourceFromCache(GetResourceRequest) returns (AnyValue);

    // IsResourceInCache returns if a resource is in cache or not
    rpc IsResourceInCache(IsResourceInCacheRequest) returns (IsResourceInCacheResponse);

    // BulkIsResourceInCache returns if a set of resources is in cache or not
    rpc BulkIsResourceInCache(BulkIsResourceInCacheRequest) returns (BulkIsResourceInCacheResponse);

    // GetConfig returns the running stratum config
    rpc GetConfig(OtherAuthorized) returns (StratumConfig);
}